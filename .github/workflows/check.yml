name: 套利机会扫描

on:
  repository_dispatch:       # 主触发：腾讯云 SCF 每天 10:00 调用
  schedule:
    # Fallback：若 SCF 失败，10:30 兜底（去重靠 state.json，不会重复推送）
    - cron: '30 2 * * *'    # UTC 02:30 = 北京 10:30
  workflow_dispatch:

concurrency:
  group: arbitrage-check
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install akshare requests

      - name: 扫描套利机会并推送
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python notify.py

      - name: 持久化 state.json 和 feedback.json（GitHub API，绕过 git push 超时）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git diff --quiet state.json feedback.json 2>/dev/null; then
            python3 persist_state.py
          else
            echo "[INFO] state.json/feedback.json 无变化，跳过提交"
          fi
